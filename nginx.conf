# Tapo Frontend — Nginx Configuration
# Features: SPA routing, API reverse proxy, WebSocket upgrade, Gzip, Correlation ID
# ── Upstream ───────────────────────────────────────────────────────────────────

upstream backend {
    server backend:8080;
    keepalive 32;
}

# ── Rate limiting zones (Nginx-level, backend also has Bucket4j for defense-in-depth) ──
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=3r/m;

# ── Server block ───────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff"   always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Health check (used by Docker HEALTHCHECK + load balancers) ─────────────
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ── API Reverse proxy ───────────────────────────────────────────────────────
    location /api/ {
        # Inject Correlation ID — picked up by CorrelationIdFilter (X-Request-ID)
        proxy_set_header X-Request-ID   $request_id;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host            $host;
        proxy_set_header Connection      "";

        proxy_pass         http://backend;
        proxy_http_version 1.1;
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # Don't buffer slow API responses
        proxy_buffering off;
    }

    # ── Auth rate limiting at Nginx level ─────────────────────────────────────
    location ~ ^/api/auth/(login|register) {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;

        proxy_set_header X-Request-ID   $request_id;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host            $host;
        proxy_pass http://backend;
    }

    # ── Contact rate limiting ──────────────────────────────────────────────────
    location /api/contact {
        limit_req zone=contact_limit burst=2 nodelay;
        limit_req_status 429;

        proxy_set_header X-Request-ID   $request_id;
        proxy_set_header X-Real-IP      $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host            $host;
        proxy_pass http://backend;
    }

    # ── WebSocket (STOMP/SockJS) ───────────────────────────────────────────────
    location /ws {
        proxy_pass         http://backend;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Request-ID $request_id;

        proxy_read_timeout 3600s;  # Keep WebSocket alive 1h
        proxy_send_timeout 3600s;
    }

    # ── Static assets caching ──────────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA Routing (must be last!) ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
